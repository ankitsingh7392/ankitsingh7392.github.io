<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Portfolio</title>
  <meta name="description" id="page-desc" content="" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VVCT6N5TXF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VVCT6N5TXF');
  </script>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <div class="nav-logo-mark" id="nav-initials"></div>
    </div>
    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#experience">Experience</a>
      <a href="#certifications">Certifications</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-avatar-wrap">
        <img src="photo.jpg" alt="" class="hero-avatar" id="hero-avatar" />
        <div class="hero-avatar-ring"></div>
      </div>
      <div class="hero-eyebrow" id="hero-eyebrow"></div>
      <h1><span class="gradient-text" id="hero-name"></span></h1>
      <h2 id="hero-title"></h2>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-meta">
        <span id="hero-location"></span>
        <span class="meta-sep">·</span>
        <span id="hero-visa" class="badge"></span>
      </div>
      <div class="hero-cta" id="hero-cta"></div>
    </div>
    <div class="hero-scroll">
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- STATS STRIP -->
  <section class="section-stats">
    <div class="container">
      <div class="stats-strip reveal" id="stats-strip"></div>
    </div>
  </section>

  <!-- AI FOCUS CARD -->
  <section class="section-ai">
    <div class="container">
      <div class="ai-card reveal" id="ai-card"></div>
    </div>
  </section>

  <!-- ABOUT -->
  <section id="about" class="section section-alt">
    <div class="container">
      <div class="section-header reveal">
        <div class="section-label">About</div>
        <h2 class="section-title" id="about-title"></h2>
      </div>
      <div class="about-grid">
        <div class="about-bio reveal reveal-delay-1" id="about-bio"></div>
        <div class="about-sidebar reveal reveal-delay-2">
          <div id="skills-groups"></div>
          <div class="about-open" id="about-open"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- EXPERIENCE -->
  <section id="experience" class="section">
    <div class="container">
      <div class="section-header reveal">
        <div class="section-label">Experience</div>
        <h2 class="section-title" id="exp-title"></h2>
      </div>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>

  <!-- CERTIFICATIONS -->
  <section id="certifications" class="section section-alt">
    <div class="container">
      <div class="section-header reveal">
        <div class="section-label">Certifications</div>
        <h2 class="section-title" id="certs-title"></h2>
      </div>
      <div class="certs-grid" id="certs-grid"></div>
    </div>
  </section>

  <!-- RECOGNITION -->
  <section class="section-recognition">
    <div class="container">
      <div class="section-header reveal">
        <div class="section-label">Recognition</div>
        <h2 class="section-title" id="recognition-title"></h2>
      </div>
      <div class="recognition-strip reveal" id="recognition-strip"></div>
    </div>
  </section>

  <!-- PROJECTS -->
  <section id="projects" class="section section-alt">
    <div class="container">
      <div class="section-header reveal">
        <div class="section-label">Projects</div>
        <h2 class="section-title" id="projects-title"></h2>
        <p class="section-sub" id="projects-sub"></p>
      </div>
      <div class="repos-grid" id="repos-grid">
        <div class="repo-loading">Fetching repositories…</div>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="section">
    <div class="container">
      <div class="contact-container reveal">
        <div class="contact-card">
          <div class="section-label" style="justify-content:center">Contact</div>
          <h2 class="section-title" id="contact-title"></h2>
          <p class="contact-sub" id="contact-sub"></p>
          <div class="contact-actions" id="contact-actions"></div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p id="footer-text"></p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
